<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Cultura Nacional</title>

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>

    <style id="input-focus-fix">
      input:focus,
      textarea:focus {
        outline: none !important;
      }
      input:-webkit-autofill:focus {
        outline: none !important;
      }
    </style>
    <style id="autofill-fix">
      /* Override Chrome autofill background */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active {
        -webkit-text-fill-color: #F5F5F5;
        box-shadow: 0 0 0 1000px #141414 inset !important;
        transition: background-color 5000s ease-in-out 0s;
      }

      @media (prefers-color-scheme: light) {
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
          -webkit-text-fill-color: #0A0A0A;
          box-shadow: 0 0 0 1000px #F5F5F5 inset !important;
        }
      }
    </style>
  <!-- Meta Tags SEO -->
    <meta name="description" content="Quiz interativo sobre cultura, história, gastronomia, natureza, turismo e curiosidades dos 27 estados brasileiros. Gamificação com ranking, missões, duelos e conquistas." />
    <meta name="keywords" content="quiz brasil, cultura brasileira, geografia brasil, história brasil" />
    <meta name="author" content="Cultura Nacional" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cultura Nacional - Quiz Interativo sobre o Brasil" />
    <meta property="og:description" content="Teste seus conhecimentos sobre os 27 estados brasileiros!" />
    <meta property="og:image" content="https://cultura-nacional.vercel.app/og-image.png" />
    <meta property="og:url" content="https://cultura-nacional.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cultura Nacional" />
    <meta name="twitter:image" content="https://cultura-nacional.vercel.app/twitter-image.png" />
  </head>
