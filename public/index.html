<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Cultura Nacional</title>

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>

    <style id="autofill-fix">
      /* Override Chrome autofill background */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active {
        -webkit-text-fill-color: #F5F5F5;
        box-shadow: 0 0 0 1000px #141414 inset !important;
        transition: background-color 5000s ease-in-out 0s;
      }

      @media (prefers-color-scheme: light) {
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
          -webkit-text-fill-color: #0A0A0A;
          box-shadow: 0 0 0 1000px #F5F5F5 inset !important;
        }
      }
    </style>
  </head>

  <body>
    <noscript>
      Você precisa habilitar o JavaScript para rodar este app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
